<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Книжная полка</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 40px;
      margin: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .status {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 16px;
      margin: 40px auto;
      max-width: 600px;
      text-align: center;
    }
    .status h2 {
      color: #00f5ff;
      margin-bottom: 15px;
    }
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .book-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s;
    }
    .book-card:hover {
      transform: translateY(-5px);
      border-color: #00f5ff;
    }
    .book-icon {
      font-size: 4rem;
      text-align: center;
      margin-bottom: 15px;
    }
    .add-btn {
      background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin: 20px auto;
      display: block;
    }
    .add-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(0, 245, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Книжная полка</h1>
    
    <div class="status">
      <h2>✅ Работает без Vite!</h2>
      <p>Эта версия использует React через CDN без сборщиков.</p>
      <p>Для полной версии с Vite/esbuild нужен запуск от администратора.</p>
    </div>

    <div id="root">
      <div class="books-grid">
        <div class="book-card">
          <div class="book-icon">📕</div>
          <h3>Полка пуста</h3>
          <p>Нажми кнопку ниже чтобы добавить первую книгу</p>
        </div>
      </div>
    </div>

    <button class="add-btn" onclick="alert('Для добавления книг нужна полная версия с Firebase')">
      ➕ Добавить книгу
    </button>
  </div>

  <script type="text/babel">
    // Простой React компонент для демонстрации
    function App() {
      return (
        <div>
          <p style={{textAlign: 'center', opacity: 0.7}}>
            🔧 Для полной функциональности запусти Vite от имени администратора
          </p>
        </div>
      );
    }
  </script>
</body>
</html>
